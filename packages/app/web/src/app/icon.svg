  <rect x="1" y="14" width="9" height="9" fill="#e8e8e6"/>
  <rect x="14" y="14" width="9" height="9" fill="#b6ff5b"/>
  <rect x="15.5" y="15.5" width="6" height="6" fill="#0a0b0d"/>
</svg>
